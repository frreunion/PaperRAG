services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: paper_rag
      POSTGRES_USER: paper_rag
      POSTGRES_PASSWORD: paper_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      PAPER_RAG_DATABASE_URL: sqlite:///./storage/app.db
      PAPER_RAG_STORAGE_DIR: storage
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
